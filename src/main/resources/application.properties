spring.application.name=book-catalog-api

# 1. Enable the H2 Console web interface
spring.h2.console.enabled=true
# The path where you can access it in the browser (localhost:8080/h2-console)
spring.h2.console.path=/h2-console

# 2. Configure the database connection settings
# "mem:bookdb" sets a stable in-memory database named "bookdb"
spring.datasource.url=jdbc:h2:mem:bookdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# 3. Hibernate SQL logging (very useful for learning!)
# This will print the actual SQL queries generated by Hibernate to your console
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true